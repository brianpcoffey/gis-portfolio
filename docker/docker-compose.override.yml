version: "3.9"

services:
  portfolio:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DATABASE_URL=${DATABASE_URL}
      - Redis__ConnectionString=redis:6379,abortConnect=false
    volumes:
      # Persist DataProtection keys so encrypted cookies and other protected data
      # remain valid across container restarts. Map a host folder to /app/DataProtection-Keys
      - ./data/dataprotection:/app/DataProtection-Keys
