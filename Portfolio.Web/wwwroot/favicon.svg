<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Brian Coffey">
  <!--
    Favicon: a map pin whose head is a network node with three linked satellites.
    It reads as "spatial" at a glance and still resolves at 16px, where a literal
    monogram or a detailed graph would turn to mush. Colours are the site's own
    accent ramp (#38a169 / #48bb78) on the deep primary (#1a365d).
  -->
  <rect width="64" height="64" rx="14" fill="#1a365d"/>

  <!-- edges, drawn first so the nodes sit on top -->
  <g stroke="#48bb78" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
    <line x1="32" y1="26" x2="18" y2="17"/>
    <line x1="32" y1="26" x2="47" y2="18"/>
    <line x1="32" y1="26" x2="44" y2="35"/>
  </g>

  <!-- satellite nodes -->
  <g fill="#48bb78">
    <circle cx="18" cy="17" r="4"/>
    <circle cx="47" cy="18" r="4"/>
    <circle cx="44" cy="35" r="4"/>
  </g>

  <!-- pin: hub node over a tapered point -->
  <path d="M32 53 L26.5 33 h11 Z" fill="#38a169"/>
  <circle cx="32" cy="26" r="9" fill="#38a169"/>
  <circle cx="32" cy="26" r="3.6" fill="#ffffff"/>
</svg>
